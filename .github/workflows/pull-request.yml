name: pull-request
on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore:
      - 'changeset-release/*'
      - 'vis-bot/update-snapshot/*'
jobs:
  code:
    uses: repobuddy/.github/.github/workflows/pnpm-verify.yml@main
    with:
      os: '["ubuntu-latest"]'

  update-snapshots:
    needs: [code]
    if: ${{ needs.code.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      PLAYWRIGHT_PATH: ~/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install playwright browsers
        uses: repobuddy/.github/.github/actions/setup-playwright@main

      - name: Install Dependencies
        run: pnpm install

      - name: Update snapshots
        run: pnpm --filter @repobuddy/vitest exec vitest run --update-snapshot
        continue-on-error: true

      - name: Check for snapshot changes
        id: changes
        run: |
          git add packages/vitest/__vis__
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Push snapshot updates
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="vis-bot/update-snapshot/${{ github.head_ref }}"
          git checkout -b "$BRANCH"
          git commit -m "fix: update visual snapshots"
          git push origin "$BRANCH" --force
          gh pr create \
            --title "fix: update visual snapshots for ${{ github.head_ref }}" \
            --body "Automated snapshot update for #${{ github.event.pull_request.number }}" \
            --base "${{ github.head_ref }}" \
            --head "$BRANCH" \
          || true
